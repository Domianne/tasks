<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâches</title>
    <link rel="stylesheet" href="tasks.css">
</head>
<body>
<button id="ajouter-liste">Nouvelle liste</button>
<button id="saveBtn">💾 Sauvegarder</button>
<button id="exporter-json">Exporter JSON</button>
<div id="container-listes"></div>
<div id="menu-contextuel" class="menu-contextuel">
  <div data-action="supprimer">Supprimer</div>
  <div data-action="vers-tdj">Tâches du jour</div>
  <div data-action="retour">Retour liste</div>
</div>
<script src="tasks.js"></script>
    <!-- Bouton discret -->
<button id="btn-settings" class="settings-btn">⚙️</button>

<!-- Fenêtre modale -->
<div id="modal-settings" class="modal">
  <div class="modal-content">
    <h3>Paramètres GitHub</h3>

    <label>Token GitHub :</label>
    <input id="input-token" type="text" placeholder="Collez votre token ici">

    <div class="actions">
      <button id="save-token">Enregistrer</button>
      <button id="delete-token">Supprimer</button>
      <button id="close-settings">Fermer</button>
    </div>

    <p id="status-token"></p>
  </div>
</div>

</body>
</html>
